name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle Wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -P /tmp
          unzip -q /tmp/gradle-8.2-bin.zip -d /tmp
          /tmp/gradle-8.2/bin/gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      - name: Show project structure
        run: find . -maxdepth 3 -type f | sort

      - name: Build APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: ContactsUploader
          path: app/build/outputs/apk/debug/app-debug.apk
